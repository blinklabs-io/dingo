# Era-transitions DevNet.
#
# Self-contained stack that exercises every Shelley-era hard fork via the
# Test{Era}HardForkAtEpoch overrides in testnet.yaml. Mirrors the shape of
# internal/test/devnet/docker-compose.yml minus txpump (txpump hardcodes
# Conway eraID=6, so it cannot run on a chain that begins in Shelley).
#
# Network: 172.22.0.0/24 (separate from the devnet stack's 172.20.0.0/24
# and the antithesis stack's 172.21.0.0/24).
#
# Host port overrides (set in environment or .env file):
#   ERASTEST_DINGO_PORT     - Dingo producer host port    (default: 3020)
#   ERASTEST_CARDANO_PORT   - Cardano producer host port  (default: 3021)
#   ERASTEST_RELAY_PORT     - Cardano relay host port     (default: 3022)

services:
  configurator:
    build:
      context: .
      dockerfile: Dockerfile.configurator
    container_name: eras-configurator
    volumes:
      - ./testnet.yaml:/testnet.yaml
      - p1-configs:/configs/1
      - p2-configs:/configs/2
      - utxo-keys:/configs/utxo-keys

  dingo-producer:
    build:
      context: ../../..
    container_name: eras-dingo-producer
    # Sleep before launching dingo so the relay→cardano-producer
    # chainsync stream has time to come up cleanly before dingo joins.
    # Genesis fires at +60s post-configurator (configurator.sh:120),
    # cardano-producer becomes healthy ~10–30s in, and we want dingo
    # online a few seconds before genesis with a warm peer connection
    # — long enough that dingo's chainsync client has handshaked the
    # relay, short enough that dingo can forge against most of its
    # epoch-0 leader slots. Without the sleep, both producers race to
    # build competing chains on top of an empty genesis and the fork
    # churn erases dingo's Shelley forges.
    entrypoint: ["/bin/sh", "-c", "sleep 30 && exec /bin/entrypoint.sh serve"]
    depends_on:
      configurator:
        condition: service_completed_successfully
      cardano-producer:
        condition: service_healthy
    environment:
      CARDANO_NETWORK: devnet
      CARDANO_CONFIG: /configs/configs/config.json
      CARDANO_TOPOLOGY: /topology/topology.json
      CARDANO_DATABASE_PATH: /data/db
      CARDANO_NODE_SOCKET_PATH: /ipc/dingo.socket
      DINGO_DEBUG: "1"
      CARDANO_BLOCK_PRODUCER: "true"
      CARDANO_SHELLEY_VRF_KEY: /configs/keys/vrf.skey
      CARDANO_SHELLEY_KES_KEY: /configs/keys/kes.skey
      CARDANO_SHELLEY_OPERATIONAL_CERTIFICATE: /configs/keys/opcert.cert
      # Tighten the forge-sync gate for the eras testnet's short
      # 75-slot epochs. The default (100) is sized for mainnet's
      # 432000-slot epoch and is wider than this testnet's entire
      # bootstrap epoch, which means it never withholds a forge
      # while dingo's chainsync is still catching up to cardano-
      # producer. The resulting bootstrap fork race rewrites
      # dingo's chain in the second half of Allegra (slots
      # ~105–149), and because the evolving nonce carries across
      # epoch boundaries without resetting, that divergence
      # propagates into Mary's candidate-nonce computation and
      # diverges every node's eta0 from Alonzo onward — every peer
      # header at slot 225+ then VRF-fails on dingo, and dingo's
      # own headers symmetrically fail on cardano-relay (which is
      # why dingo's vkey never appears as an issuer past Shelley).
      # 5 is tight enough to actually fire during bootstrap (the
      # gap is much wider than 5 while syncing through cardano's
      # head start) but loose enough to absorb sub-second
      # chainsync propagation jitter on a stable post-bootstrap
      # chain.
      DINGO_FORGE_SYNC_TOLERANCE_SLOTS: "5"
    volumes:
      - p1-configs:/configs:ro
      - ./topology/dingo-producer.json:/topology/topology.json:ro
      - dingo-producer-data:/data/db
      - dingo-producer-ipc:/ipc
    ports:
      - "${ERASTEST_DINGO_PORT:-3020}:3001"
    networks:
      eras:
        ipv4_address: 172.22.0.10
    healthcheck:
      test: ["CMD-SHELL", "test -S /ipc/dingo.socket || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  cardano-producer:
    image: ghcr.io/blinklabs-io/cardano-node:10.5.4
    container_name: eras-cardano-producer
    depends_on:
      configurator:
        condition: service_completed_successfully
      cardano-relay:
        condition: service_healthy
    environment:
      CARDANO_BLOCK_PRODUCER: "true"
      RESTORE_SNAPSHOT: "false"
    command:
      - "run"
      - "--config"
      - "/configs/configs/config.json"
      - "--topology"
      - "/topology/topology.json"
      - "--database-path"
      - "/data/db"
      - "--socket-path"
      - "/ipc/node.socket"
      - "--shelley-kes-key"
      - "/configs/keys/kes.skey"
      - "--shelley-vrf-key"
      - "/configs/keys/vrf.skey"
      - "--shelley-operational-certificate"
      - "/configs/keys/opcert.cert"
      - "--port"
      - "3001"
    volumes:
      - p2-configs:/configs
      - ./topology/cardano-producer.json:/topology/topology.json:ro
      - cardano-producer-data:/data/db
      - cardano-producer-ipc:/ipc
    ports:
      - "${ERASTEST_CARDANO_PORT:-3021}:3001"
    networks:
      eras:
        ipv4_address: 172.22.0.11
    healthcheck:
      test: ["CMD-SHELL", "test -S /ipc/node.socket || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  cardano-relay:
    image: ghcr.io/blinklabs-io/cardano-node:10.5.4
    container_name: eras-cardano-relay
    depends_on:
      configurator:
        condition: service_completed_successfully
    environment:
      RESTORE_SNAPSHOT: "false"
    command:
      - "run"
      - "--config"
      - "/configs/configs/config.json"
      - "--topology"
      - "/topology/topology.json"
      - "--database-path"
      - "/data/db"
      - "--socket-path"
      - "/ipc/node.socket"
      - "--port"
      - "3001"
    volumes:
      - p1-configs:/configs
      - ./topology/relay.json:/topology/topology.json:ro
      - cardano-relay-data:/data/db
      - cardano-relay-ipc:/ipc
    ports:
      - "${ERASTEST_RELAY_PORT:-3022}:3001"
    networks:
      eras:
        ipv4_address: 172.22.0.12
    healthcheck:
      test: ["CMD-SHELL", "test -S /ipc/node.socket || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

networks:
  eras:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  p1-configs:
  p2-configs:
  utxo-keys:
  dingo-producer-data:
  dingo-producer-ipc:
  cardano-producer-data:
  cardano-producer-ipc:
  cardano-relay-data:
  cardano-relay-ipc:
