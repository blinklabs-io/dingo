services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dingo_metadata}
      POSTGRES_USER: ${POSTGRES_USER:-dingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dingo}
      DINGO_GOV_LENS_PASSWORD: ${DINGO_GOV_LENS_PASSWORD:-dingo_gov_lens}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  dingo-sync:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: final
    image: ${DINGO_IMAGE:-dingo-gov-lens-dingo:local}
    profiles:
      - sync
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["-n", "preview", "mithril", "sync"]
    environment: &dingo-env
      CARDANO_NETWORK: preview
      CARDANO_DATABASE_PATH: /data/db
      DINGO_SOCKET_PATH: /ipc/dingo.socket
      DINGO_STORAGE_MODE: api
      DINGO_DATABASE_METADATA_PLUGIN: postgres
      DINGO_DATABASE_METADATA_POSTGRES_DSN: "host=postgres port=5432 user=${POSTGRES_USER:-dingo} password=${POSTGRES_PASSWORD:-dingo} dbname=${POSTGRES_DB:-dingo_metadata} sslmode=disable TimeZone=UTC"
      DINGO_DATABASE_METADATA_POSTGRES_STORAGE_MODE: api
      DINGO_DATABASE_BLOB_PLUGIN: badger
      DINGO_DATABASE_WORKERS: ${DINGO_DATABASE_WORKERS:-16}
      DINGO_DATABASE_QUEUE_SIZE: ${DINGO_DATABASE_QUEUE_SIZE:-500}
      DINGO_BACKFILL_BATCH_SIZE: ${DINGO_BACKFILL_BATCH_SIZE:-1000}
      DINGO_UTXORPC_PORT: "0"
      DINGO_BLOCKFROST_PORT: "0"
      DINGO_MESH_PORT: "0"
    volumes:
      - dingo-data:/data/db
      - dingo-ipc:/ipc

  dingo:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: final
    image: ${DINGO_IMAGE:-dingo-gov-lens-dingo:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["-n", "preview", "serve"]
    environment:
      <<: *dingo-env
    ports:
      - "127.0.0.1:${DINGO_METRICS_PORT:-12798}:12798"
      - "${DINGO_RELAY_PORT:-3001}:3001"
    volumes:
      - dingo-data:/data/db
      - dingo-ipc:/ipc

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADDR: 0.0.0.0:8088
      GOVTOOL_BASE_URL: ${GOVTOOL_BASE_URL:-https://preview.gov.tools}
      DATABASE_URL: "host=postgres port=5432 user=dingo_gov_lens password=${DINGO_GOV_LENS_PASSWORD:-dingo_gov_lens} dbname=${POSTGRES_DB:-dingo_metadata} sslmode=disable TimeZone=UTC"
    ports:
      - "${APP_BIND_ADDR:-127.0.0.1}:${APP_PORT:-8088}:8088"

volumes:
  postgres-data:
  dingo-data:
  dingo-ipc:
