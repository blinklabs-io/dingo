image:
  repository: ghcr.io/blinklabs-io/dingo
  tag: "0.64.0"
  pullPolicy: IfNotPresent

mithril:
  enabled: true
  cleanupAfterLoad: true
  verifyCertificates: true

environment:
  CARDANO_NETWORK: "preview"
  CARDANO_DATABASE_PATH: "/data"
  DINGO_STORAGE_MODE: "api"
  DINGO_PLUGINS_STORAGE_METADATA_PROVIDER: "postgres"
  DINGO_PLUGINS_STORAGE_METADATA_CONFIG_DSN: "host=postgres.example.svc port=5432 user=dingo password=change-me dbname=dingo_metadata sslmode=verify-full sslrootcert=/etc/postgres-ca/ca.crt TimeZone=UTC"
  DINGO_PLUGINS_STORAGE_BLOB_PROVIDER: "badger"
  DINGO_PLUGINS_API_UTXORPC_CONFIG_PORT: "0"
  DINGO_PLUGINS_API_BLOCKFROST_CONFIG_PORT: "0"
  DINGO_PLUGINS_API_MESH_CONFIG_PORT: "0"

persistence:
  accessMode: ReadWriteOnce
  size: 80Gi

service:
  type: ClusterIP
  ports:
    private: 3002
    relay: 3001
    metrics: 12798
    utxorpc: 0
    blockfrost: 0
    mesh: 0

resources:
  requests:
    cpu: 1
    memory: 4Gi
  limits:
    cpu: 4
    memory: 12Gi
