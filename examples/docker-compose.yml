services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dingo_metadata}
      POSTGRES_USER: ${POSTGRES_USER:-dingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dingo}
      DINGO_GOV_LENS_PASSWORD: ${DINGO_GOV_LENS_PASSWORD:-dingo_gov_lens}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./dingo-gov-lens/docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  dingo-sync:
    build:
      context: ..
      dockerfile: Dockerfile
      target: final
    image: ${DINGO_IMAGE:-dingo-examples-dingo:local}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["-n", "preview", "mithril", "sync"]
    environment: &dingo-env
      CARDANO_NETWORK: preview
      CARDANO_DATABASE_PATH: /data/db
      DINGO_SOCKET_PATH: /ipc/dingo.socket
      DINGO_STORAGE_MODE: api
      DINGO_PLUGINS_STORAGE_METADATA_PROVIDER: postgres
      DINGO_PLUGINS_STORAGE_METADATA_CONFIG_DSN: "host=postgres port=5432 user=${POSTGRES_USER:-dingo} password=${POSTGRES_PASSWORD:-dingo} dbname=${POSTGRES_DB:-dingo_metadata} sslmode=disable TimeZone=UTC"
      DINGO_PLUGINS_STORAGE_BLOB_PROVIDER: badger
      DINGO_DATABASE_WORKERS: ${DINGO_DATABASE_WORKERS:-16}
      DINGO_DATABASE_QUEUE_SIZE: ${DINGO_DATABASE_QUEUE_SIZE:-500}
      DINGO_BACKFILL_BATCH_SIZE: ${DINGO_BACKFILL_BATCH_SIZE:-1000}
      DINGO_PLUGINS_API_UTXORPC_CONFIG_PORT: "${DINGO_PLUGINS_API_UTXORPC_CONFIG_PORT:-9090}"
      DINGO_PLUGINS_API_BLOCKFROST_CONFIG_PORT: "${DINGO_PLUGINS_API_BLOCKFROST_CONFIG_PORT:-3000}"
      DINGO_PLUGINS_API_MESH_CONFIG_PORT: "${DINGO_PLUGINS_API_MESH_CONFIG_PORT:-8080}"
    volumes:
      - dingo-data:/data/db
      - dingo-ipc:/ipc

  dingo:
    build:
      context: ..
      dockerfile: Dockerfile
      target: final
    image: ${DINGO_IMAGE:-dingo-examples-dingo:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      dingo-sync:
        condition: service_completed_successfully
    command: ["-n", "preview", "serve"]
    environment:
      <<: *dingo-env
    ports:
      - "${DINGO_BIND_ADDR:-0.0.0.0}:${DINGO_PLUGINS_API_BLOCKFROST_CONFIG_PORT:-3000}:${DINGO_PLUGINS_API_BLOCKFROST_CONFIG_PORT:-3000}"
      - "${DINGO_BIND_ADDR:-0.0.0.0}:${DINGO_PLUGINS_API_UTXORPC_CONFIG_PORT:-9090}:${DINGO_PLUGINS_API_UTXORPC_CONFIG_PORT:-9090}"
      - "${DINGO_BIND_ADDR:-0.0.0.0}:${DINGO_PLUGINS_API_MESH_CONFIG_PORT:-8080}:${DINGO_PLUGINS_API_MESH_CONFIG_PORT:-8080}"
      - "${DINGO_BIND_ADDR:-0.0.0.0}:${DINGO_METRICS_PORT:-12798}:12798"
      - "${DINGO_BIND_ADDR:-0.0.0.0}:${DINGO_RELAY_PORT:-3001}:3001"
    volumes:
      - dingo-data:/data/db
      - dingo-ipc:/ipc

  gov-lens:
    build:
      context: ./dingo-gov-lens
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      dingo-sync:
        condition: service_completed_successfully
    environment:
      ADDR: 0.0.0.0:8088
      GOVTOOL_BASE_URL: ${GOVTOOL_BASE_URL:-https://preview.gov.tools}
      DATABASE_URL: "host=postgres port=5432 user=dingo_gov_lens password=${DINGO_GOV_LENS_PASSWORD:-dingo_gov_lens} dbname=${POSTGRES_DB:-dingo_metadata} sslmode=disable TimeZone=UTC"
    ports:
      - "${GOV_LENS_BIND_ADDR:-127.0.0.1}:${GOV_LENS_PORT:-8088}:8088"

  blockfrost-explorer:
    image: node:24-alpine
    restart: unless-stopped
    depends_on:
      dingo:
        condition: service_started
    working_dir: /app
    command: ["sh", "-c", "npm ci && npm run dev"]
    environment:
      DINGO_BLOCKFROST_URL: http://dingo:${DINGO_PLUGINS_API_BLOCKFROST_CONFIG_PORT:-3000}
      DINGO_METRICS_URL: http://dingo:12798
    ports:
      - "${BLOCKFROST_EXPLORER_BIND_ADDR:-0.0.0.0}:${BLOCKFROST_EXPLORER_PORT:-5173}:5173"
    volumes:
      - ./dingo-blockfrost-explorer:/app
      - blockfrost-explorer-node-modules:/app/node_modules

  sundae-preview:
    image: node:24-alpine
    restart: unless-stopped
    depends_on:
      dingo:
        condition: service_started
    working_dir: /app
    command: ["sh", "-c", "npm ci && npm run dev"]
    environment:
      DINGO_UTXORPC_URL: http://dingo:${DINGO_PLUGINS_API_UTXORPC_CONFIG_PORT:-9090}
    ports:
      - "${SUNDAE_PREVIEW_BIND_ADDR:-0.0.0.0}:${SUNDAE_PREVIEW_PORT:-5174}:5173"
    volumes:
      - ./dingo-sundae-preview:/app
      - sundae-preview-node-modules:/app/node_modules

volumes:
  postgres-data:
  dingo-data:
  dingo-ipc:
  blockfrost-explorer-node-modules:
  sundae-preview-node-modules:
