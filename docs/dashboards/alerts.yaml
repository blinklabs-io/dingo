groups:
  - name: dingo
    rules:
      - alert: DingoBlockStall
        expr: changes(cardano_node_metrics_blockNum_int{network=~".+"}[5m]) == 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Dingo block height stalled on {{ $labels.network }}"
          description: "Node {{ $labels.instance }} on {{ $labels.network }}: block height has not changed in 5 minutes."

      - alert: DingoSlotDrift
        expr: changes(cardano_node_metrics_slotNum_int{network=~".+"}[2m]) == 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Dingo slot counter stalled on {{ $labels.network }}"
          description: "Node {{ $labels.instance }} on {{ $labels.network }}: slot counter has not advanced in 2 minutes."

      - alert: DingoPeerLoss
        expr: cardano_node_metrics_connectionManager_outgoingConns{network=~".+"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Dingo has no outgoing peers on {{ $labels.network }}"
          description: "Node {{ $labels.instance }} on {{ $labels.network }}: zero outgoing connections for 5+ minutes. Node cannot sync."
