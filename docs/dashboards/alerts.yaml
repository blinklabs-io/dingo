groups:
  - name: dingo
    rules:
      - alert: DingoBlockStall
        expr: increase(cardano_node_metrics_blockNum_int[5m]) == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Dingo block height stalled"
          description: "cardano_node_metrics_blockNum_int has not increased in 3+ minutes."

      - alert: DingoSlotDrift
        expr: increase(cardano_node_metrics_slotNum_int[2m]) == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Dingo slot counter stalled"
          description: "cardano_node_metrics_slotNum_int has not increased in 2 minutes. Node may be stalled or disconnected."

      - alert: DingoPeerLoss
        expr: cardano_node_metrics_connectionManager_outgoingConns == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Dingo has no outgoing peer connections"
          description: "cardano_node_metrics_connectionManager_outgoingConns has been 0 for 5+ minutes. Node cannot sync."
